<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vietnamese ASR — live stream</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1115; --fg:#e8eaed; --dim:#9aa0a6;
          --accent:#4f8cff; --live:#ff4f5e; --card:#171a21; --line:#262b33; }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f7f8fa; --fg:#14171c; --dim:#5f6672; --card:#fff; --line:#e2e5ea; }
  }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--fg);
         font:16px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
         display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap { width:100%; max-width:820px; }
  h1 { font-size:1.25rem; margin:0 0 4px; font-weight:650; }
  .sub { color:var(--dim); font-size:.85rem; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:20px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  button { font:inherit; font-weight:600; border:0; border-radius:10px; padding:12px 22px;
           cursor:pointer; background:var(--accent); color:#fff; }
  button.rec { background:var(--live); }
  button.ghost { background:transparent; color:var(--dim); border:1px solid var(--line); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--dim); }
  .dot.on { background:var(--live); animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.25; } }
  .meter { flex:1; min-width:120px; height:6px; background:var(--line);
           border-radius:3px; overflow:hidden; }
  .meter i { display:block; height:100%; width:0; background:var(--accent);
             transition:width .08s linear; }
  .out { margin-top:18px; padding:18px; min-height:120px; border-radius:10px;
         background:var(--bg); border:1px solid var(--line);
         font-size:1.35rem; line-height:1.5; word-wrap:break-word; }
  .out:empty::before { content:"Nói đi… / Speak…"; color:var(--dim); font-size:1rem; }
  .seg { display:block; margin-bottom:6px; }
  .who { color:var(--accent); font-weight:700; }
  .who.unk { color:var(--dim); font-weight:600; }
  .live { color:var(--dim); }
  .live::after { content:"▌"; animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .stats { margin-top:12px; color:var(--dim); font-size:.8rem;
           font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .err { color:var(--live); font-size:.85rem; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Vietnamese ASR — live stream</h1>
  <div class="sub" id="sub">connecting…</div>

  <div class="card">
    <div class="row">
      <button id="btn" disabled>Start</button>
      <button id="clear" class="ghost">Clear</button>
      <span class="dot" id="dot"></span>
      <span class="meter"><i id="lvl"></i></span>
    </div>
    <div class="out" id="out"></div>
    <div class="stats" id="stats"></div>
    <div class="err" id="err"></div>
  </div>
</div>

<script>
const btn=document.getElementById("btn"), out=document.getElementById("out"),
      dot=document.getElementById("dot"), lvl=document.getElementById("lvl"),
      stats=document.getElementById("stats"), sub=document.getElementById("sub"),
      err=document.getElementById("err"), clearBtn=document.getElementById("clear");

clearBtn.onclick = () => { segments = []; partial = ""; render(); stats.textContent = ""; err.textContent = ""; };

const SR = 16000;               // must match training features
let ws, ctx, src, node, stream, recording = false;
let segments = [], partial = "";

function render(){
  out.innerHTML = "";
  for (const s of segments){
    const d = document.createElement("span"); d.className = "seg";
    if (s.speaker){
      const tag = document.createElement("b"); tag.className = "who";
      tag.textContent = s.speaker + ": ";
      if (s.speaker === "unknown") tag.classList.add("unk");
      d.appendChild(tag);
    }
    d.appendChild(document.createTextNode(s.text));
    out.appendChild(d);
  }
  if (partial){
    const d = document.createElement("span"); d.className = "live"; d.textContent = partial;
    out.appendChild(d);
  }
}

fetch("/health").then(r=>r.json()).then(d=>{
  sub.textContent = `${d.modelDir} · ${d.decoder} · beam ${d.beam} · `
    + (d.vad ? `Silero VAD, endpoint @${d.minSilenceMs}ms silence` : "VAD off");
  btn.disabled = false;
}).catch(e => { sub.textContent = "server unreachable"; });

btn.onclick = () => recording ? stop() : start();

async function start(){
  err.textContent = ""; segments = []; partial = ""; render();
  stats.textContent = "";
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount:1, echoCancellation:true, noiseSuppression:true }
    });
  } catch(e){
    err.textContent = "Mic denied: " + e.message
      + (location.protocol === "http:" && location.hostname !== "localhost"
         ? " — a microphone needs HTTPS (or localhost)." : "");
    return;
  }

  // Ask the browser for 16 kHz directly; no manual resampling.
  ctx = new (window.AudioContext||window.webkitAudioContext)({ sampleRate: SR });
  if (ctx.sampleRate !== SR) err.textContent =
    `Warning: got ${ctx.sampleRate} Hz, expected ${SR} Hz — features may mismatch.`;

  // wss:// when the page is https (phone via tunnel), else ws://
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.binaryType = "arraybuffer";

  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === "partial"){
      partial = m.text; render();
      stats.textContent = `${m.audioSeconds}s audio · listening…`;
    } else if (m.type === "segment"){
      if (m.text) segments.push({text: m.text, speaker: m.speaker});
      partial = ""; render();
      stats.textContent = `${m.audioSeconds}s audio · ${segments.length} sentence(s)`;
    } else if (m.type === "speech"){
      dot.classList.toggle("on", m.active);
    } else if (m.type === "final"){
      if (m.text) segments.push({text: m.text, speaker: m.speaker});
      partial = ""; render();
      stats.textContent = `${m.audioSeconds}s audio · RTF ${m.rtf ?? "–"} · ${segments.length} sentence(s) · stopped`;
      ws.close();
    } else if (m.type === "error"){
      err.textContent = m.message;
    }
  };
  ws.onerror = () => err.textContent = "WebSocket error";

  await new Promise(r => ws.onopen = r);

  src = ctx.createMediaStreamSource(stream);
  node = ctx.createScriptProcessor(2048, 1, 1);   // ~128 ms at 16 kHz
  node.onaudioprocess = e => {
    if (!recording || ws.readyState !== 1) return;
    const f = e.inputBuffer.getChannelData(0);
    let peak = 0;
    const pcm = new Int16Array(f.length);
    for (let i=0;i<f.length;i++){
      const s = Math.max(-1, Math.min(1, f[i]));
      if (Math.abs(s) > peak) peak = Math.abs(s);
      pcm[i] = s < 0 ? s*0x8000 : s*0x7fff;
    }
    lvl.style.width = Math.min(100, peak*140) + "%";
    ws.send(pcm.buffer);
  };
  src.connect(node); node.connect(ctx.destination);

  recording = true; btn.textContent = "Stop"; btn.classList.add("rec");
}

function stop(){
  recording = false; btn.textContent = "Start"; btn.classList.remove("rec");
  dot.classList.remove("on"); lvl.style.width = "0";
  if (ws && ws.readyState === 1) ws.send("stop");     // flush the tail
  if (node) node.disconnect();
  if (src) src.disconnect();
  if (stream) stream.getTracks().forEach(t=>t.stop());
  if (ctx) ctx.close();
}
</script>
</body>
</html>
