<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VietnameseASR Demo</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <h1>VietnameseASR</h1>
          <p id="status">Checking Jetson...</p>
        </div>
        <div class="meter" aria-hidden="true">
          <span id="level"></span>
        </div>
      </section>

      <section class="picker">
        <label class="utterance-select">
          <span>Model</span>
          <select id="modelSelect"></select>
        </label>
        <label>
          <span>Speaker</span>
          <select id="speakerSelect"></select>
        </label>
        <label class="utterance-select">
          <span>Example</span>
          <select id="exampleSelect"></select>
        </label>
        <button id="playExampleBtn" disabled>Play</button>
        <button id="runExampleBtn" disabled>Run Example</button>
      </section>

      <section class="utterance">
        <div class="utterance-head">
          <span id="promptId">-</span>
          <button id="nextPromptBtn">Random</button>
        </div>
        <p id="targetText">Loading utterance...</p>
      </section>

      <section class="recording">
        <button id="recordBtn" class="record-btn">Record</button>
        <div class="run-info">
          <span>Duration <strong id="duration">0.0s</strong></span>
          <span>Runtime <strong id="runtime">-</strong></span>
        </div>
      </section>

      <section class="result">
        <h2>ASR Output</h2>
        <div id="transcript">Choose an utterance, record it, then stop to run ASR.</div>
      </section>

      <section class="audio">
        <audio id="player" controls></audio>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
