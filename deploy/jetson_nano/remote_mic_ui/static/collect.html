<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VietnameseASR Collection</title>
    <link rel="stylesheet" href="/collect.css" />
  </head>
  <body>
    <main class="collect-app">
      <header class="collect-header">
        <div>
          <h1>Record Dataset</h1>
          <p id="status">Loading collection...</p>
        </div>
        <div class="progress-ring">
          <strong id="progressCount">0/0</strong>
          <span>saved</span>
        </div>
      </header>

      <section class="panel participant-panel">
        <label>
          <span>Participant</span>
          <select id="participantSelect"></select>
        </label>
        <div class="meter" aria-hidden="true">
          <span id="level"></span>
        </div>
      </section>

      <section class="script-panel">
        <div class="script-meta">
          <span id="scriptIndex">Sentence -</span>
          <span id="scriptState">Not recorded</span>
        </div>
        <p id="scriptText">Loading sentence...</p>
      </section>

      <section class="record-panel">
        <button id="recordBtn" class="record-btn">Record</button>
        <div class="time-row">
          <span>Duration <strong id="duration">0.0s</strong></span>
          <span id="durationHint">Aim for natural reading.</span>
        </div>
        <audio id="player" controls></audio>
      </section>

      <section class="actions">
        <button id="prevBtn" class="secondary">Previous</button>
        <button id="saveBtn" disabled>Save</button>
        <button id="resetBtn" class="secondary" disabled>Re-record</button>
        <button id="nextBtn" class="secondary">Next</button>
      </section>
    </main>
    <script src="/collect.js"></script>
  </body>
</html>
